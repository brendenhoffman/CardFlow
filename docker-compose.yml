services:
  cardflow-backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: cardflow-backend
    environment:
      DATABASE_URL: sqlite:///data/cardflow.db
      COOKIE_SECURE: "false"
    volumes:
      - cardflow-data:/data
    ports:
      - "8778:3001"
    restart: unless-stopped

  cardflow-frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: cardflow-frontend
    depends_on:
      - cardflow-backend
    ports:
      - "8777:80"
    restart: unless-stopped

  # MCP server for AI agents. CARDFLOW_TOKEN must be created via Settings ->
  # API tokens in the running app, then set here (e.g. in a .env file) before
  # this service can start.
  cardflow-mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    container_name: cardflow-mcp
    environment:
      CARDFLOW_URL: http://cardflow-backend:3001
      CARDFLOW_TOKEN: ${CARDFLOW_TOKEN}
      MCP_PORT: 3778
    depends_on:
      - cardflow-backend
    ports:
      - "${MCP_PORT:-3778}:3778"
    restart: unless-stopped

volumes:
  cardflow-data:
