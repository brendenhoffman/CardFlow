services:
  cardflow-backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: cardflow-backend
    environment:
      DATABASE_URL: sqlite:///data/cardflow.db
      # No TLS termination in this default compose setup — set to "true" once
      # the app is served over HTTPS so the refresh-token cookie requires it.
      COOKIE_SECURE: "false"
    volumes:
      - cardflow-data:/data
    ports:
      - "3001:3001"
    restart: unless-stopped

  cardflow-frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: cardflow-frontend
    depends_on:
      - cardflow-backend
    ports:
      - "3000:80"
    restart: unless-stopped

volumes:
  cardflow-data:
