services:
  cardflow-backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: cardflow-backend
    environment:
      DATABASE_URL: sqlite:///data/cardflow.db
      COOKIE_SECURE: "false"
    volumes:
      - cardflow-data:/data
    ports:
      - "8778:3001"
    restart: unless-stopped

  cardflow-frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: cardflow-frontend
    depends_on:
      - cardflow-backend
    ports:
      - "8777:80"
    restart: unless-stopped

volumes:
  cardflow-data:
